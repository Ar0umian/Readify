{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh; padding-top: 50px;">
    <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">
        <h3 class="text-center fw-bold mb-4">تسجيل الدخول</h3>
        
        {% if form.errors %}
            <div class="alert alert-danger small py-2 text-center">
                اسم المستخدم أو كلمة المرور غير صحيحة
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">اسم المستخدم</label>
                <input type="text" name="username" class="form-control rounded-pill" placeholder="اسم المستخدم" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">كلمة المرور</label>
                <input type="password" name="password" class="form-control rounded-pill" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">دخول</button>
        </form>
        
        <p class="mt-3 text-center small text-muted">ما عندك حساب؟ 
            <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">سجل الآن</a>
        </p>
    </div>
</div>
{% endblock %}
