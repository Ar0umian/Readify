{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-3">
             <div class="list-group shadow-sm border-0 rounded-4 overflow-hidden">
                <a href="{% url 'edit_profile' %}" class="list-group-item list-group-item-action border-0 py-3">
                    <i class="bi bi-person-circle me-2"></i> البيانات الأساسية
                </a>
                <a href="#" class="list-group-item list-group-item-action active border-0 py-3">
                    <i class="bi bi-shield-lock me-2"></i> تغيير كلمة المرور
                </a>
            </div>
        </div>
        
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4 p-4 text-start">
                <h4 class="fw-bold mb-4">تغيير كلمة المرور</h4>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                            {{ field }} 
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success rounded-pill w-100 fw-bold">تحديث كلمة المرور</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
