{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh; padding-top: 100px;">
    <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 450px; background: rgba(255,255,255,0.95);">
        <div class="card-body">
            <h2 class="text-center fw-bold mb-4 text-dark">إنشاء حساب جديد</h2>
            
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3 text-end">
                        <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                        {{ field }} 
                        {% if field.errors %}
                            <div class="text-danger tiny mt-1">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3 fw-bold shadow-sm">
                        تسجيل الحساب
                    </button>
                </form>

            <div class="text-center mt-4">
                <p class="small text-muted">لديك حساب بالفعل؟ <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">سجل دخولك</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
